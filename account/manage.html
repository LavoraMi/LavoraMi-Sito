<!DOCTYPE html>
<html lang="it">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Gestione Account - LavoraMi</title>
        
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
        <link rel="icon" href="../img/icon.webp">
        <link rel="stylesheet" href="../css/style.css">
        
        <style>
            :root {
                --bg-dark: #0a0a0a;
                --bg-card: #161616;
                --accent: #ff0015;
                --accent-hover: #e60013;
                --text-main: #ffffff;
                --text-muted: #a0a0a0;
                --input-bg: #222222;
                --border-color: #333333;
                --btn-blue: #0084ff; /* Il blu dei bottoni dello screen */
            }

            body {
                background-color: var(--bg-dark);
                color: var(--text-main);
                font-family: 'Inter', sans-serif;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
            }

            .navbar {
                background: rgba(10,10,10,0.9);
                backdrop-filter: blur(10px);
                border-bottom: 1px solid rgba(255,255,255,0.05);
            }

            .auth-wrapper {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 20px;
                margin-top: 60px;
                margin-bottom: 40px;
            }

            .auth-card {
                background-color: var(--bg-card);
                border: 1px solid var(--border-color);
                border-radius: 20px;
                padding: 40px;
                width: 100%;
                max-width: 480px; /* Leggermente più larga per far respirare i dati */
                box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            }

            .auth-card h2 {
                font-weight: 800;
                margin-bottom: 10px;
            }

            .auth-card p.subtitle {
                color: var(--text-muted);
                font-size: 0.95rem;
                margin-bottom: 30px;
            }

            .section-title {
                color: var(--text-muted);
                font-size: 0.85rem;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 1px;
                margin-bottom: 15px;
                border-bottom: 1px solid var(--border-color);
                padding-bottom: 8px;
            }

            .info-row {
                display: flex;
                align-items: center;
                background-color: var(--input-bg);
                border: 1px solid var(--border-color);
                border-radius: 12px;
                padding: 15px;
                margin-bottom: 15px;
            }

            .info-row i {
                font-size: 1.5rem;
                color: var(--accent);
                margin-right: 15px;
            }

            .info-row span {
                font-size: 1.1rem;
                font-weight: 600;
                word-break: break-all;
            }

            .btn-blue {
                background: var(--btn-blue);
                color: white;
                border: none;
                border-radius: 12px;
                padding: 14px;
                font-weight: 600;
                font-size: 1rem;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: transform 0.2s, background-color 0.2s;
            }

            .btn-blue:hover {
                transform: translateY(-2px);
                background-color: #0073e6;
                color: white;
            }

            .btn-blue i {
                font-size: 1.2rem;
            }

            .btn-accent {
                background: linear-gradient(135deg, #ff0015 0%, #ff4757 100%);
                color: white;
                border: none;
                border-radius: 12px;
                padding: 14px;
                font-weight: 600;
                font-size: 1rem;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: transform 0.2s, box-shadow 0.2s;
            }

            .btn-accent:hover {
                transform: translateY(-2px);
                box-shadow: 0 5px 15px rgba(255, 0, 21, 0.3);
                color: white;
            }

            #preloader {
                position: fixed;
                top: 0; left: 0; width: 100%; height: 100%;
                background-color: var(--bg-dark);
                z-index: 9999;
                display: flex; justify-content: center; align-items: center;
                transition: opacity 0.5s ease, visibility 0.5s ease;
            }
            
            .loader-hidden { opacity: 0; visibility: hidden; }

            .lm-modal-overlay {
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.75);
                backdrop-filter: blur(6px);
                z-index: 8000;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 20px;
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.25s ease;
            }
            .lm-modal-overlay.open { opacity: 1; pointer-events: all; }

            .lm-modal {
                background: var(--bg-card);
                border: 1px solid var(--border-color);
                border-radius: 20px;
                padding: 36px 32px 28px;
                width: 100%;
                max-width: 400px;
                box-shadow: 0 20px 60px rgba(0,0,0,0.7);
                transform: translateY(20px) scale(0.97);
                transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1);
                text-align: center;
            }
            .lm-modal-overlay.open .lm-modal { transform: translateY(0) scale(1); }

            .lm-modal-icon {
                width: 64px; height: 64px;
                border-radius: 50%;
                display: flex; align-items: center; justify-content: center;
                margin: 0 auto 20px;
                font-size: 1.8rem;
            }
            .lm-modal-icon.danger  { background: rgba(255,0,21,0.12); border: 1.5px solid rgba(255,0,21,0.3); color: var(--accent); }
            .lm-modal-icon.warning { background: rgba(255,168,0,0.12); border: 1.5px solid rgba(255,168,0,0.3); color: #ffa800; }

            .lm-modal h3 { font-weight: 800; font-size: 1.3rem; margin-bottom: 10px; }
            .lm-modal p  { color: var(--text-muted); font-size: 0.92rem; line-height: 1.6; margin-bottom: 28px; }
            .lm-modal p strong { color: var(--text-main); }

            .lm-modal-divider { border: none; border-top: 1px solid var(--border-color); margin: 0 -32px 24px; }

            .lm-modal-actions { display: flex; gap: 12px; }

            .lm-btn {
                flex: 1; padding: 13px; border-radius: 12px;
                font-weight: 600; font-size: 0.95rem;
                border: none; cursor: pointer;
                transition: transform 0.18s, box-shadow 0.18s;
            }
            .lm-btn:hover { transform: translateY(-2px); }

            .lm-btn-ghost  { background: var(--input-bg); color: var(--text-muted); border: 1px solid var(--border-color); }
            .lm-btn-ghost:hover { background: #2a2a2a; color: var(--text-main); }

            .lm-btn-danger  { background: linear-gradient(135deg,#ff0015,#ff4757); color: white; }
            .lm-btn-danger:hover { box-shadow: 0 6px 20px rgba(255,0,21,0.4); }

            .lm-btn-warning { background: linear-gradient(135deg,#ffa800,#ffcc00); color: #1a1000; }
            .lm-btn-warning:hover { box-shadow: 0 6px 20px rgba(255,168,0,0.35); }
        </style>
    </head>
    <body>
        <div id="preloader">
            <div class="loader-content">
                <img src="../img/icon.webp" alt="LavoraMI Logo" class="pulse-logo" width="70">
            </div>
        </div>

        <nav class="navbar navbar-dark fixed-top">
            <div class="container justify-content-center">
                <a class="navbar-brand fw-bold m-0" href="#">
                    <img src="../img/icon.webp" alt="Icon" height="30px" width="30px" class="rounded" draggable="false">&nbsp; LavoraMi
                </a>
            </div>
        </nav>

        <div class="auth-wrapper">
            <div class="auth-card text-start">
                <div class="text-center mb-4">
                    <h2>👋 Ciao <span id="displayFirstName"></span></h2>
                    <p class="subtitle">Qua puoi gestire il tuo account e le tue informazioni.</p>
                </div>
                <div id="errorMessage" class="alert alert-danger alert-message d-none" role="alert">
                    <i class="bi bi-exclamation-circle"></i> <span id="errorText"></span>
                </div>
                <div class="mb-5">
                    <div class="section-title">Informazioni</div>
                    <div class="info-row">
                        <i class="bi bi-person-fill"></i>
                        <span id="userFullName"></span>
                    </div>
                    <div class="info-row">
                        <i class="bi bi-envelope-fill"></i>
                        <span id="userEmail"></span>
                    </div>
                </div>

                <div class="mb-4">
                    <div class="section-title">Gestisci</div>
                    <button class="btn btn-blue w-100 mb-3" id="editPassword">
                        <i class="bi bi-lock-fill me-2"></i> Modifica Password
                    </button>
                    <button class="btn btn-blue w-100 mb-3" id="deleteAccountBtn">
                        <i class="bi bi-trash3-fill me-2"></i> Elimina Account
                    </button>
                    <button class="btn btn-blue w-100 mb-4" id="requestDataBtn">
                        <i class="bi bi-person-vcard-fill me-2"></i> Richiedi i tuoi dati
                    </button>
                </div>

                <button class="btn btn-accent w-100 mt-2" id="logoutBtn">
                    <i class="bi bi-box-arrow-right me-2"></i> Esci
                </button>
                <div class="lm-modal-overlay" id="modalLogoutOverlay">
                    <div class="lm-modal">
                        <div class="lm-modal-icon danger"><i class="bi bi-box-arrow-right" id="modal_icon"></i></div>
                        <h3 id="modal_title">Esci dall'account</h3>
                        <hr class="lm-modal-divider">
                        <p id="modal_deps">Sei sicuro di voler uscire? Dovrai accedere di nuovo con le tue credenziali.</p>
                        <div class="lm-modal-actions">
                            <button class="lm-btn lm-btn-ghost" id="modalLogoutCancel">Annulla</button>
                            <button class="lm-btn lm-btn-danger" id="modalLogoutConfirm">Continua</button>
                        </div>
                    </div>
                </div>
                <div class="lm-modal-overlay" id="modalOneButtonOverlay">
                    <div class="lm-modal">
                        <div class="lm-modal-icon warning"><i class="bi bi-info-circle-fill"></i></div>
                        <h3 id="modal_title_one"></h3>
                        <hr class="lm-modal-divider">
                        <p id="modal_deps_one"></p>
                        <div class="lm-modal-actions">
                            <button class="lm-btn lm-btn-warning" id="modalClose">Chiudi</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.98.0"></script>
        <script src="/config.js"></script><script src="../js/db/manage_account.js"></script>
    </body>
</html>
