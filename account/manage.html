<!DOCTYPE html>
<html lang="it">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Gestione Account - LavoraMi</title>
        
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css">
        <link href="https://api.fontshare.com/v2/css?f[]=general-sans@300,400,500,600,700,800&display=swap" rel="stylesheet">
        <link rel="icon" href="../img/icon.webp">
        <link rel="stylesheet" href="../css/style.css">
        <link rel="stylesheet" href="../css/manage_account.css">
    </head>
    <body>
       <div id="preloader">
            <div class="loader-content">
                <img src="../img/icon.webp" alt="LavoraMI Logo" class="pulse-logo" draggable="false">
                <div class="loader-line"></div>
            </div>
        </div>
        <nav class="navbar navbar-dark fixed-top">
            <div class="container justify-content-center">
                <a class="navbar-brand fw-bold m-0" href="#">
                    <img src="../img/icon.webp" alt="Icon" height="30px" width="30px" class="rounded" draggable="false">&nbsp; LavoraMi
                </a>
                <div class="ms-auto">
                    <a href="../index.html" class="btn btn-outline-light btn-sm rounded-pill px-3 btn-back" style="text-decoration: none;">
                        <i class="bi bi-arrow-left me-2"></i>Torna alla Home
                    </a>
                </div>
            </div>
        </nav>
        <div class="auth-wrapper">
            <div class="auth-card text-start">
                <div class="text-center mb-4">
                    <h2>👋 Ciao <span id="displayFirstName"></span></h2>
                    <p class="subtitle">Qua puoi gestire il tuo account e le tue informazioni.</p>
                </div>
                <div id="errorMessage" class="alert alert-danger alert-message d-none" role="alert">
                    <i class="bi bi-exclamation-circle"></i> <span id="errorText"></span>
                </div>
                <div class="mb-5">
                    <div class="section-title">Informazioni</div>
                    <div class="info-row">
                        <i class="bi bi-person-fill"></i>
                        <span id="userFullName"></span>
                    </div>
                    <div class="info-row">
                        <i class="bi bi-envelope-fill"></i>
                        <span id="userEmail"></span>
                    </div>
                    <div class="info-row" id="loggedInWithGoogle">
                        <img src="../img/google_logo.webp" alt="Icon" height="30px" width="30px" draggable="false">
                        <span>&nbsp;&nbsp;Login con Google</span>
                    </div>
                    <div class="info-row" id="loggedInWithApple">
                        <img src="../img/apple_logo.webp" alt="Icon" height="30px" width="26px" draggable="false">
                        <span>&nbsp;&nbsp;Login con Apple</span>
                    </div>
                </div> 
                <div class="mb-4">
                    <div class="section-title">Gestisci</div>
                    <button class="btn btn-blue w-100 mb-3" id="editPassword">
                        <i class="bi bi-lock-fill me-2"></i> Modifica Password
                    </button>
                    <button class="btn btn-blue w-100 mb-3" id="deleteAccountBtn">
                        <i class="bi bi-trash3-fill me-2"></i> Elimina Account
                    </button>
                    <button class="btn btn-blue w-100 mb-4" id="requestDataBtn">
                        <i class="bi bi-person-vcard-fill me-2"></i> Richiedi i tuoi dati
                    </button>
                </div>
                <button class="btn btn-accent w-100 mt-2" id="logoutBtn">
                    <i class="bi bi-box-arrow-right me-2"></i> Esci
                </button>
                <div class="lm-modal-overlay" id="modalLogoutOverlay">
                    <div class="lm-modal">
                        <div class="lm-modal-icon danger"><i class="bi bi-box-arrow-right" id="modal_icon"></i></div>
                        <h3 id="modal_title">Esci dall'account</h3>
                        <hr class="lm-modal-divider">
                        <p id="modal_deps">Sei sicuro di voler uscire? Dovrai accedere di nuovo con le tue credenziali.</p>
                        <div class="lm-modal-actions">
                            <button class="lm-btn lm-btn-ghost" id="modalLogoutCancel">Annulla</button>
                            <button class="lm-btn lm-btn-danger" id="modalLogoutConfirm">Continua</button>
                        </div>
                    </div>
                </div>
                <div class="lm-modal-overlay" id="modalOneButtonOverlay">
                    <div class="lm-modal">
                        <div class="lm-modal-icon warning"><i class="bi bi-info-circle-fill"></i></div>
                        <h3 id="modal_title_one"></h3>
                        <hr class="lm-modal-divider">
                        <p id="modal_deps_one"></p>
                        <div class="lm-modal-actions">
                            <button class="lm-btn lm-btn-warning" id="modalClose">Chiudi</button>
                        </div>
                    </div>
                </div>
                <div class="lm-modal-overlay" id="modalSuccess">
                    <div class="lm-modal">
                        <div class="lm-modal-icon success"><i class="bi bi-info-circle-fill" id="modal_icon_success"></i></div>
                        <h3 id="modal_title_success"></h3>
                        <hr class="lm-modal-divider">
                        <p id="modal_deps_success"></p>
                        <div class="lm-modal-actions">
                            <button class="lm-btn lm-btn-success" id="modalSuccessClose">Chiudi</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.104.1"></script>
        <script src="/config.js"></script><script src="../js/db/manage_account.js"></script>
        <script src="https://unpkg.com/lenis@1.3.23/dist/lenis.min.js"></script>
        <script>const lenis = new Lenis({ autoRaf: true });</script>
    </body>
</html>
