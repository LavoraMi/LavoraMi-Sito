<!DOCTYPE html>
<html lang="it">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Gestione Account - LavoraMi</title>
        
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
        <link rel="icon" href="../img/icon.webp">
        <link rel="stylesheet" href="../css/style.css">
        
        <style>
            :root {
                --bg-dark: #0a0a0a;
                --bg-card: #161616;
                --accent: #ff0015;
                --accent-hover: #e60013;
                --text-main: #ffffff;
                --text-muted: #a0a0a0;
                --input-bg: #222222;
                --border-color: #333333;
                --btn-blue: #0084ff; /* Il blu dei bottoni dello screen */
            }

            body {
                background-color: var(--bg-dark);
                color: var(--text-main);
                font-family: 'Inter', sans-serif;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
            }

            .navbar {
                background: rgba(10,10,10,0.9);
                backdrop-filter: blur(10px);
                border-bottom: 1px solid rgba(255,255,255,0.05);
            }

            .auth-wrapper {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 20px;
                margin-top: 60px;
                margin-bottom: 40px;
            }

            .auth-card {
                background-color: var(--bg-card);
                border: 1px solid var(--border-color);
                border-radius: 20px;
                padding: 40px;
                width: 100%;
                max-width: 480px; /* Leggermente più larga per far respirare i dati */
                box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            }

            .auth-card h2 {
                font-weight: 800;
                margin-bottom: 10px;
            }

            .auth-card p.subtitle {
                color: var(--text-muted);
                font-size: 0.95rem;
                margin-bottom: 30px;
            }

            .section-title {
                color: var(--text-muted);
                font-size: 0.85rem;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 1px;
                margin-bottom: 15px;
                border-bottom: 1px solid var(--border-color);
                padding-bottom: 8px;
            }

            .info-row {
                display: flex;
                align-items: center;
                background-color: var(--input-bg);
                border: 1px solid var(--border-color);
                border-radius: 12px;
                padding: 15px;
                margin-bottom: 15px;
            }

            .info-row i {
                font-size: 1.5rem;
                color: var(--accent);
                margin-right: 15px;
            }

            .info-row span {
                font-size: 1.1rem;
                font-weight: 600;
                word-break: break-all;
            }

            /* Stile per i bottoni azzurri dell'app */
            .btn-blue {
                background: var(--btn-blue);
                color: white;
                border: none;
                border-radius: 12px;
                padding: 14px;
                font-weight: 600;
                font-size: 1rem;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: transform 0.2s, background-color 0.2s;
            }

            .btn-blue:hover {
                transform: translateY(-2px);
                background-color: #0073e6;
                color: white;
            }

            .btn-blue i {
                font-size: 1.2rem;
            }

            /* Stile bottone esci rosso */
            .btn-accent {
                background: linear-gradient(135deg, #ff0015 0%, #ff4757 100%);
                color: white;
                border: none;
                border-radius: 12px;
                padding: 14px;
                font-weight: 600;
                font-size: 1rem;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: transform 0.2s, box-shadow 0.2s;
            }

            .btn-accent:hover {
                transform: translateY(-2px);
                box-shadow: 0 5px 15px rgba(255, 0, 21, 0.3);
                color: white;
            }

            #preloader {
                position: fixed;
                top: 0; left: 0; width: 100%; height: 100%;
                background-color: var(--bg-dark);
                z-index: 9999;
                display: flex; justify-content: center; align-items: center;
                transition: opacity 0.5s ease, visibility 0.5s ease;
            }
            
            .loader-hidden { opacity: 0; visibility: hidden; }
        </style>
    </head>
    <body>
        <div id="preloader">
            <div class="loader-content">
                <img src="../img/icon.webp" alt="LavoraMI Logo" class="pulse-logo" width="70">
            </div>
        </div>

        <nav class="navbar navbar-dark fixed-top">
            <div class="container justify-content-center">
                <a class="navbar-brand fw-bold m-0" href="#">
                    <img src="../img/icon.webp" alt="Icon" height="30px" width="30px" class="rounded" draggable="false">&nbsp; LavoraMi
                </a>
            </div>
        </nav>

        <div class="auth-wrapper">
            <div class="auth-card text-start">
                
                <div class="text-center mb-4">
                    <h2>👋 Ciao <span id="displayFirstName">Andrea</span></h2>
                    <p class="subtitle">Qua puoi gestire il tuo account e le tue informazioni.</p>
                </div>

                <div id="errorMessage" class="alert alert-danger alert-message d-none" role="alert">
                    <i class="bi bi-exclamation-circle"></i> <span id="errorText"></span>
                </div>

                <div class="mb-5">
                    <div class="section-title">Informazioni</div>
                    
                    <div class="info-row">
                        <i class="bi bi-person-fill"></i>
                        <span id="userFullName"></span>
                    </div>

                    <div class="info-row">
                        <i class="bi bi-envelope-fill"></i>
                        <span id="userEmail"></span>
                    </div>
                </div>

                <div class="mb-4">
                    <div class="section-title">Gestisci</div>
                    
                    <button class="btn btn-blue w-100 mb-3" onclick="window.location.href='/account/reset-password'">
                        <i class="bi bi-lock-fill me-2"></i> Modifica Password
                    </button>

                    <button class="btn btn-blue w-100 mb-3" id="deleteAccountBtn">
                        <i class="bi bi-trash3-fill me-2"></i> Elimina Account
                    </button>

                    <button class="btn btn-blue w-100 mb-4" id="requestDataBtn">
                        <i class="bi bi-person-vcard-fill me-2"></i> Richiedi i tuoi dati
                    </button>
                </div>

                <button class="btn btn-accent w-100 mt-2" id="logoutBtn">
                    <i class="bi bi-box-arrow-right me-2"></i> Esci
                </button>

            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.98.0"></script>
        <script src="/config.js"></script><script src="../js/db/manage_account.js"></script>
        <script>
            window.addEventListener('load', () => {
                const preloader = document.getElementById('preloader');
                if (preloader) {
                    setTimeout(() => { preloader.classList.add('loader-hidden'); }, 300);
                }
            });
        </script>
    </body>
</html>
