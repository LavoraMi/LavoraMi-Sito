<!DOCTYPE html>
<html lang="it">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login - LavoraMi</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css">
        <link href="https://api.fontshare.com/v2/css?f[]=general-sans@300,400,500,600,700,800&display=swap" rel="stylesheet">
        <link rel="icon" href="../img/icon.webp">
        <link rel="stylesheet" href="../css/style.css">
        <link rel="stylesheet" href="../css/reset_password.css">
    </head>
    <body>
        <div id="preloader">
            <div class="loader-content">
                <img src="../img/icon.webp" alt="LavoraMI Logo" class="pulse-logo">
                <div class="loader-line"></div>
            </div>
        </div>
        <nav class="navbar navbar-dark fixed-top">
            <div class="container justify-content-center">
                <a class="navbar-brand fw-bold m-0" href="#">
                    <img src="../img/icon.webp" alt="Icon" height="30px" width="30px" class="rounded" draggable="false">&nbsp; LavoraMi
                </a>
                <div class="ms-auto">
                    <a href="../index.html" class="btn btn-outline-light btn-sm rounded-pill px-3" style="text-decoration: none;">
                        <i class="bi bi-arrow-left me-2"></i>Torna alla Home
                    </a>
                </div>
            </div>
        </nav>
        <div class="auth-wrapper">
            <div class="auth-card text-center">
                <h2>Login</h2>
                <p>Effettua il Login al tuo Account LavoraMi.</p>

                <div id="successMessage" class="alert alert-success alert-message d-none" role="alert">
                    <i class="bi bi-check-circle"></i> Login effettuato con successo!
                </div>

                <div id="errorMessage" class="alert alert-danger alert-message d-none" role="alert">
                    <i class="bi bi-exclamation-circle"></i> <span id="errorText"></span>
                </div>

                <form id="loginForm" class="text-start">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <div class="input-group">
                            <input type="email" class="form-control" id="email" placeholder="esempio@esempio.com" required minlength="8">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">Password</label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="password" placeholder="Inserisci la tua password" required minlength="8">
                            <span class="input-group-text" onclick="togglePassword('password', 'eyeIcon2')">
                                <i class="bi bi-eye-slash" id="eyeIcon2"></i>
                            </span>
                        </div>
                        <div id="passwordError" class="text-danger mt-2 small d-none">
                            <i class="bi bi-exclamation-circle"></i> Le credenziali che hai inserito sono errate.
                        </div>
                    </div>
                    <p>Continuando, accetti i <a href="/termsOfService">Termini di Servizio</a> e la <a href="/privacypolicy">Privacy Policy</a>.</p>
                    <button type="submit" class="btn btn-accent w-100" id="submitBtn">Login</button><br><br>
                    <h5>Accedi con</h5>
                    <hr>
                    <button class="btn btn-white w-100" id="googleLogin"><img src="../img/google_logo.webp" alt="Google Logo" width="25px" height="25px" style="display: inline;">&nbsp;&nbsp;Accedi con Google</button><br><br>
                    <div style="display: flex; gap: 15px;">
                        <div id="passwordRecovery" class="text-danger mt-2 small d-block" style="cursor: pointer;">
                            <i class="bi bi-question-circle-fill"></i> Password Dimenticata?
                        </div>
                        <div id="createAccount" class="text-danger mt-2 small d-block" style="cursor: pointer;">
                            <i class="bi bi-person-fill-add"></i> Non hai un account?
                        </div>
                    </div>
                </form>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.99.3"></script>
        <script src="/config.js"></script><script src="../js/db/login.js"></script>
        <script id="Cookiebot" src="https://consent.cookiebot.com/uc.js" data-cbid="d8671f03-dd54-4364-93b3-38a10878e903" data-blockingmode="auto" type="text/javascript"></script>
    </body>
</html>
