<!DOCTYPE html>
<html lang="it">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Modifica Password - LavoraMi</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
        <link rel="icon" href="../img/icon.webp">
        <link rel="stylesheet" href="../css/style.css">

        <style>
            :root {
                --bg-dark: #0a0a0a;
                --bg-card: #161616;
                --accent: #ff0015;
                --accent-hover: #e60013;
                --text-main: #ffffff;
                --text-muted: #a0a0a0;
                --input-bg: #222222;
                --border-color: #333333;
            }

            body {
                background-color: var(--bg-dark);
                color: var(--text-main);
                font-family: 'Inter', sans-serif;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
            }

            .navbar {
                background: rgba(10,10,10,0.9);
                backdrop-filter: blur(10px);
                border-bottom: 1px solid rgba(255,255,255,0.05);
            }

            .auth-wrapper {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 20px;
                margin-top: 60px;
            }

            .auth-card {
                background-color: var(--bg-card);
                border: 1px solid var(--border-color);
                border-radius: 20px;
                padding: 40px;
                width: 100%;
                max-width: 450px;
                box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            }

            .auth-card h2 {
                font-weight: 800;
                margin-bottom: 10px;
            }

            .auth-card p {
                color: var(--text-muted);
                font-size: 0.95rem;
                margin-bottom: 30px;
            }

            .form-label {
                color: var(--text-muted);
                font-size: 0.85rem;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 1px;
                margin-bottom: 8px;
            }

            .form-control {
                background-color: var(--input-bg);
                border: 1px solid var(--border-color);
                color: var(--text-main);
                border-radius: 12px;
                padding: 12px 15px;
                font-size: 1rem;
                transition: all 0.3s ease;
            }

            .form-control:focus {
                background-color: var(--input-bg);
                border-color: var(--accent);
                color: var(--text-main);
                box-shadow: 0 0 0 4px rgba(255, 0, 21, 0.15);
            }

            .form-control::placeholder {
                color: #666;
            }

            .input-group-text {
                background-color: var(--input-bg);
                border: 1px solid var(--border-color);
                color: var(--text-muted);
                border-radius: 12px;
                cursor: pointer;
                transition: all 0.3s ease;
            }

            .form-control:focus + .input-group-text {
                border-color: var(--accent);
            }

            .input-group-text:hover {
                color: var(--text-main);
            }

            .btn-accent {
                background: linear-gradient(135deg, #ff0015 0%, #ff4757 100%);
                color: white;
                border: none;
                border-radius: 50px;
                padding: 14px;
                font-weight: 600;
                font-size: 1rem;
                transition: transform 0.2s, box-shadow 0.2s;
            }

            .btn-accent:hover:not(:disabled) {
                transform: translateY(-2px);
                box-shadow: 0 5px 15px rgba(255, 0, 21, 0.3);
                color: white;
            }

            .btn-accent:disabled {
                opacity: 0.6;
                cursor: not-allowed;
            }

            .alert-message {
                border-radius: 12px;
                padding: 12px;
                margin-bottom: 20px;
                font-size: 0.9rem;
            }
        </style>
    </head>
    <body>
        <div id="preloader">
            <div class="loader-content">
                <img src="../img/icon.webp" alt="LavoraMI Logo" class="pulse-logo">
                <div class="loader-line"></div>
            </div>
        </div>

        <nav class="navbar navbar-dark fixed-top">
            <div class="container justify-content-center">
                <a class="navbar-brand fw-bold m-0" href="#">
                    <img src="../img/icon.webp" alt="Icon" height="30px" width="30px" class="rounded" draggable="false">&nbsp; LavoraMi
                </a>
            </div>
        </nav>

        <div class="auth-wrapper">
            <div class="auth-card text-center">
                <h2>Modifica Password</h2>
                <p>Inserisci la nuova password per il tuo account LavoraMi.</p>

                <div id="userInfo" class="alert alert-info alert-message d-none" role="alert">
                    Email: <strong id="userEmail"></strong>
                </div>

                <div id="successMessage" class="alert alert-success alert-message d-none" role="alert">
                    <i class="bi bi-check-circle"></i> Password aggiornata con successo! Reindirizzamento in corso...
                </div>

                <div id="errorMessage" class="alert alert-danger alert-message d-none" role="alert">
                    <i class="bi bi-exclamation-circle"></i> <span id="errorText"></span>
                </div>

                <form id="resetPasswordForm" class="text-start">
                    <div class="mb-3">
                        <label for="newPassword" class="form-label">Password</label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="newPassword" placeholder="Minimo 8 caratteri" required minlength="8">
                            <span class="input-group-text" onclick="togglePassword('newPassword', 'eyeIcon1')">
                                <i class="bi bi-eye-slash" id="eyeIcon1"></i>
                            </span>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="confirmPassword" class="form-label">Conferma Password</label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="confirmPassword" placeholder="Ripeti la password" required minlength="8">
                            <span class="input-group-text" onclick="togglePassword('confirmPassword', 'eyeIcon2')">
                                <i class="bi bi-eye-slash" id="eyeIcon2"></i>
                            </span>
                        </div>
                        <div id="passwordError" class="text-danger mt-2 small d-none">
                            <i class="bi bi-exclamation-circle"></i> Le password non coincidono.
                        </div>
                    </div>

                    <button type="submit" class="btn btn-accent w-100" id="submitBtn">Aggiorna Password</button>
                </form>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src="/config.js"></script>

        <script>
            let supabaseClient;
            let recoverySessionReady = false;

            function initSupabase() {
                if (!window.ENV?.SUPABASE_URL || !window.ENV?.SUPABASE_ANON_KEY) {
                    showError('Configurazione ENV non caricata.');
                    return false;
                }

                supabaseClient = window.supabase.createClient(
                    window.ENV.SUPABASE_URL,
                    window.ENV.SUPABASE_ANON_KEY,
                    {
                        auth: {
                            detectSessionInUrl: false,
                            flowType: 'pkce'
                        }
                    }
                );

                return true;
            }

            function showError(message) {
                const errorDiv = document.getElementById('errorMessage');
                const errorText = document.getElementById('errorText');
                const form = document.getElementById('resetPasswordForm');
                const userInfo = document.getElementById('userInfo');

                errorText.textContent = message;
                errorDiv.classList.remove('d-none');
                form.style.display = 'none';
                userInfo.classList.add('d-none');
            }

            function togglePassword(inputId, iconId) {
                const input = document.getElementById(inputId);
                const icon = document.getElementById(iconId);
                const isPwd = input.type === 'password';
                input.type = isPwd ? 'text' : 'password';
                icon.classList.toggle('bi-eye-slash', !isPwd);
                icon.classList.toggle('bi-eye', isPwd);
            }

            function validatePasswords() {
                const pwd = document.getElementById('newPassword').value;
                const confirm = document.getElementById('confirmPassword').value;
                const errDiv = document.getElementById('passwordError');
                const match = pwd === confirm;
                errDiv.classList.toggle('d-none', match);
                return match;
            }

            async function handleRecovery() {
                const urlParams = new URLSearchParams(window.location.search);
                const code = urlParams.get('code');
                const error = urlParams.get('error');
                const errorDescription = urlParams.get('error_description');

                if (error) {
                    showError('Link non valido o scaduto. Richiedi un nuovo reset password.');
                    return false;
                }

                if (!code) {
                    showError('Link non valido o mancante.');
                    return false;
                }

                const { data, error: exchangeError } =
                    await supabaseClient.auth.exchangeCodeForSession(code);

                if (exchangeError) {
                    showError('Link scaduto o già utilizzato.');
                    return false;
                }

                if (!data?.session?.user) {
                    showError('Sessione non valida.');
                    return false;
                }

                document.getElementById('userEmail').textContent =
                    data.session.user.email;

                document.getElementById('userInfo').classList.remove('d-none');

                recoverySessionReady = true;
                return true;
            }

            async function resetPassword(newPassword) {
                if (!recoverySessionReady) {
                    showError('Sessione non valida. Riprova.');
                    return;
                }

                const submitBtn = document.getElementById('submitBtn');

                try {
                    submitBtn.disabled = true;
                    submitBtn.textContent = 'Aggiornamento...';

                    const { error } = await supabaseClient.auth.updateUser({
                        password: newPassword
                    });

                    if (error) throw error;

                    document.getElementById('resetPasswordForm').style.display = 'none';
                    document.getElementById('successMessage').classList.remove('d-none');

                    setTimeout(() => {
                        window.location.href = '/';
                    }, 3000);

                } catch (err) {
                    showError(err.message || 'Errore nell\'aggiornamento.');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Aggiorna Password';
                }
            }

            document.getElementById('resetPasswordForm')
                .addEventListener('submit', function (e) {
                    e.preventDefault();
                    if (validatePasswords()) {
                        resetPassword(
                            document.getElementById('newPassword').value
                        );
                    }
                });

            window.addEventListener('load', async () => {
                const preloader = document.getElementById('preloader');
                if (preloader) setTimeout(() => preloader.classList.add('loader-hidden'), 500);
                if (!initSupabase()) return;

                const ok = await handleRecovery();
                if (!ok) return;

                document.getElementById('errorMessage').classList.add('d-none');
                document.getElementById('resetPasswordForm').style.display = 'block';
            });
        </script>
    </body>
</html>
