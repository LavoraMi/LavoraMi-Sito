<!DOCTYPE html>
<html lang="it">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Modifica Password - LavoraMi</title>
        
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
        <link rel="icon" href="/img/icon.webp">
        
        <style>
            :root {
                --bg-dark: #0a0a0a;
                --bg-card: #161616;
                --accent: #ff0015;
                --accent-hover: #e60013;
                --text-main: #ffffff;
                --text-muted: #a0a0a0;
                --input-bg: #222222;
                --border-color: #333333;
            }

            body {
                background-color: var(--bg-dark);
                color: var(--text-main);
                font-family: 'Inter', sans-serif;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
            }

            .navbar {
                background: rgba(10,10,10,0.9);
                backdrop-filter: blur(10px);
                border-bottom: 1px solid rgba(255,255,255,0.05);
            }

            .auth-wrapper {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 20px;
                margin-top: 60px;
            }

            .auth-card {
                background-color: var(--bg-card);
                border: 1px solid var(--border-color);
                border-radius: 20px;
                padding: 40px;
                width: 100%;
                max-width: 450px;
                box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            }

            .auth-card h2 {
                font-weight: 800;
                margin-bottom: 10px;
            }

            .auth-card p {
                color: var(--text-muted);
                font-size: 0.95rem;
                margin-bottom: 30px;
            }

            .form-label {
                color: var(--text-muted);
                font-size: 0.85rem;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 1px;
                margin-bottom: 8px;
            }

            .form-control {
                background-color: var(--input-bg);
                border: 1px solid var(--border-color);
                color: var(--text-main);
                border-radius: 12px;
                padding: 12px 15px;
                font-size: 1rem;
                transition: all 0.3s ease;
            }

            .form-control:focus {
                background-color: var(--input-bg);
                border-color: var(--accent);
                color: var(--text-main);
                box-shadow: 0 0 0 4px rgba(255, 0, 21, 0.15);
            }

            .form-control::placeholder {
                color: #666;
            }

            .input-group-text {
                background-color: var(--input-bg);
                border: 1px solid var(--border-color);
                color: var(--text-muted);
                border-radius: 12px;
                cursor: pointer;
                transition: all 0.3s ease;
            }

            .form-control:focus + .input-group-text {
                border-color: var(--accent);
            }

            .input-group-text:hover {
                color: var(--text-main);
            }

            .btn-accent {
                background: linear-gradient(135deg, #ff0015 0%, #ff4757 100%);
                color: white;
                border: none;
                border-radius: 50px;
                padding: 14px;
                font-weight: 600;
                font-size: 1rem;
                transition: transform 0.2s, box-shadow 0.2s;
            }

            .btn-accent:hover:not(:disabled) {
                transform: translateY(-2px);
                box-shadow: 0 5px 15px rgba(255, 0, 21, 0.3);
                color: white;
            }

            .btn-accent:disabled {
                opacity: 0.6;
                cursor: not-allowed;
            }

            .alert-message {
                border-radius: 12px;
                padding: 12px;
                margin-bottom: 20px;
                font-size: 0.9rem;
            }
        </style>
    </head>
    <body>
        <div id="preloader">
            <div class="loader-content">
                <img src="/img/icon.webp" alt="LavoraMI Logo" width="70" class="pulse-logo">
            </div>
        </div>

        <nav class="navbar navbar-dark fixed-top">
            <div class="container justify-content-center">
                <a class="navbar-brand fw-bold m-0" href="#">
                    <img src="/img/icon.webp" alt="Icon" height="30px" width="30px" class="rounded" draggable="false">&nbsp; LavoraMi
                </a>
            </div>
        </nav>

        <div class="auth-wrapper">
            <div class="auth-card text-center">
                <h2>Modifica Password</h2>
                <p>Inserisci la nuova password per il tuo account LavoraMi.</p>

                <div id="userInfo" class="alert alert-info alert-message d-none" role="alert">
                    Email: <strong id="userEmail"></strong>
                </div>

                <div id="successMessage" class="alert alert-success alert-message d-none" role="alert">
                    <i class="bi bi-check-circle"></i> Password aggiornata con successo!
                </div>

                <div id="errorMessage" class="alert alert-danger alert-message d-none" role="alert">
                    <i class="bi bi-exclamation-circle"></i> <span id="errorText"></span>
                </div>

                <form id="resetPasswordForm" class="text-start" style="display: none;">
                    <div class="mb-3">
                        <label for="newPassword" class="form-label">Password</label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="newPassword" placeholder="Minimo 8 caratteri" required minlength="8">
                            <span class="input-group-text" onclick="togglePassword('newPassword', 'eyeIcon1')">
                                <i class="bi bi-eye-slash" id="eyeIcon1"></i>
                            </span>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="confirmPassword" class="form-label">Conferma Password</label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="confirmPassword" placeholder="Ripeti la password" required minlength="8">
                            <span class="input-group-text" onclick="togglePassword('confirmPassword', 'eyeIcon2')">
                                <i class="bi bi-eye-slash" id="eyeIcon2"></i>
                            </span>
                        </div>
                        <div id="passwordError" class="text-danger mt-2 small d-none">
                            <i class="bi bi-exclamation-circle"></i> Le password non coincidono.
                        </div>
                    </div>

                    <button type="submit" class="btn btn-accent w-100" id="submitBtn">Aggiorna Password</button>
                </form>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src="/config.js"></script>
        
        <script>
            let supabaseClient;

            async function initSupabase() {
                if (!window.ENV || !window.ENV.SUPABASE_URL || !window.ENV.SUPABASE_KEY) {
                    showError('Errore critico: File config.js non trovato o variabili mancanti.');
                    return false;
                }

                if (!window.supabase) {
                    showError('Errore: Libreria Supabase non caricata.');
                    return false;
                }

                try {
                    supabaseClient = window.supabase.createClient(
                        window.ENV.SUPABASE_URL,
                        window.ENV.SUPABASE_KEY
                    );
                    return true;
                } catch (error) {
                    showError('Errore inizializzazione Supabase.');
                    return false;
                }
            }

            async function loadUserInfo() {
                try {
                    await new Promise(resolve => setTimeout(resolve, 800));

                    const { data: { session }, error: sessionError } = await supabaseClient.auth.getSession();
                    
                    if (sessionError || !session) {
                        showError('Sessione non valida o link scaduto. Richiedi una nuova email di reset.');
                        return;
                    }

                    const { data: { user }, error: userError } = await supabaseClient.auth.getUser();
                    
                    if (userError || !user) {
                        showError('Errore nel caricamento dei dati utente.');
                        return;
                    }

                    document.getElementById('userEmail').textContent = user.email;
                    document.getElementById('userInfo').classList.remove('d-none');
                    document.getElementById('errorMessage').classList.add('d-none');
                    document.getElementById('resetPasswordForm').style.display = 'block';

                } catch (error) {
                    showError('Errore nel caricamento della pagina.');
                }
            }

            function showError(message) {
                const errorDiv = document.getElementById('errorMessage');
                document.getElementById('errorText').textContent = message;
                errorDiv.classList.remove('d-none');
                document.getElementById('userInfo').classList.add('d-none');
                document.getElementById('resetPasswordForm').style.display = 'none';
            }

            function togglePassword(inputId, iconId) {
                const input = document.getElementById(inputId);
                const icon = document.getElementById(iconId);
                if (input.type === "password") {
                    input.type = "text";
                    icon.classList.remove("bi-eye-slash");
                    icon.classList.add("bi-eye");
                } else {
                    input.type = "password";
                    icon.classList.remove("bi-eye");
                    icon.classList.add("bi-eye-slash");
                }
            }

            document.getElementById('resetPasswordForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const pwd = document.getElementById('newPassword').value;
                const confirmPwd = document.getElementById('confirmPassword').value;
                const errorDiv = document.getElementById('passwordError');
                const submitBtn = document.getElementById('submitBtn');

                if (pwd !== confirmPwd) {
                    errorDiv.classList.remove('d-none');
                    return;
                }
                errorDiv.classList.add('d-none');

                submitBtn.disabled = true;
                submitBtn.textContent = 'Aggiornamento in corso...';

                try {
                    const { error } = await supabaseClient.auth.updateUser({ password: pwd });
                    if (error) throw error;

                    document.getElementById('resetPasswordForm').style.display = 'none';
                    document.getElementById('successMessage').classList.remove('d-none');
                    
                    setTimeout(() => { window.location.href = '/'; }, 3000);
                } catch (error) {
                    showError(error.message || 'Errore nell\'aggiornamento della password.');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Aggiorna Password';
                }
            });

            window.addEventListener('load', async () => {
                const preloader = document.getElementById('preloader');
                if (preloader) setTimeout(() => { preloader.classList.add('loader-hidden'); }, 500);
                
                const isInitialized = await initSupabase();
                if (isInitialized) {
                    await loadUserInfo();
                }
            });
        </script>
    </body>
</html>
